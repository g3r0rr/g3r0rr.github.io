<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>MO Transfers4all Athens — QR Code</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1b2a;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; font-family: 'Georgia', serif;
  }
  .card {
    background: #0d1b2a;
    border: 2px solid #c9a84c;
    padding: 2.5rem 2rem;
    text-align: center;
    max-width: 360px;
    width: 90%;
  }
  .brand {
    color: #c9a84c;
    font-size: 1.1rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 0.3rem;
  }
  .sub {
    color: #8a9ab0;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 1.8rem;
  }
  .qr-wrap {
    background: white;
    padding: 16px;
    display: inline-block;
    margin-bottom: 1.8rem;
  }
  .qr-wrap img { display: block; width: 220px; height: 220px; }
  .url {
    color: #c9a84c;
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    margin-bottom: 0.5rem;
  }
  .tagline {
    color: #8a9ab0;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .divider {
    width: 40px; height: 1px;
    background: #c9a84c; opacity: 0.5;
    margin: 1rem auto;
  }
  .contact {
    color: #8a9ab0; font-size: 0.72rem;
    line-height: 1.8;
  }
  .contact a { color: #c9a84c; text-decoration: none; }
  @media print {
    body { background: white; }
    .card { border-color: #c9a84c; background: white; }
    .brand, .url { color: #c9a84c; }
    .sub, .tagline, .contact { color: #555; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="brand">MO Transfers4all Athens</div>
  <div class="sub">Scan to Book Your Transfer</div>
  <div class="qr-wrap">
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=https://mo-transfers4all.gr&bgcolor=ffffff&color=0d1b2a&margin=0" alt="QR Code"/>
  </div>
  <div class="url">mo-transfers4all.gr</div>
  <div class="divider"></div>
  <div class="contact">
    <a href="tel:+306936475451">+30 693 647 5451</a><br/>
    <a href="mailto:marjoruci@gmail.com">marjoruci@gmail.com</a>
  </div>
  <div class="divider"></div>
  <div class="tagline">Private Transfers · Athens & Attica</div>
</div>
</body>
</html>
